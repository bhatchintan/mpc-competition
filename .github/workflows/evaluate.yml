name: Evaluate submissions

on:
  pull_request:
    paths:
      - "submissions/**"
      - "evaluator/**"
      - "pyproject.toml"
  push:
    branches:
      - main
    paths:
      - "submissions/**"
      - "evaluator/**"
      - "pyproject.toml"
      - "index.html"
      - "leaderboard.json"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run evaluator
        run: python -m evaluator.evaluate_all

      - name: Commit leaderboard
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add leaderboard.json
          git commit -m "update leaderboard" || echo "no changes"
          git push
