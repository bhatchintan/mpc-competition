<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPC leaderboard</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ec;
      color: #172026;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 24px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #50606b;
      max-width: 62ch;
      line-height: 1.55;
    }

    img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #d9cec0;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #d9cec0;
      border-radius: 8px;
      overflow: hidden;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid #eadfd1;
      font-size: 0.96rem;
    }

    th {
      background: #172026;
      color: white;
      font-weight: 650;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .score,
    .metric {
      display: block;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .name {
      font-weight: 650;
    }

    .metric {
      display: flex;
      justify-content: center;
    }

    .status-ok {
      color: #166534;
    }

    .status-error,
    .status-timeout {
      color: #b91c1c;
    }

    .empty {
      padding: 24px;
      background: white;
      border: 1px solid #d9cec0;
      border-radius: 8px;
      color: #50606b;
    }

    @media (max-width: 760px) {
      header {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 10px 8px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section>
        <h1>MPC competition</h1>
        <p>
          Controllers for unicyle kinematics are scored on waypoint progress, obstacle clearance,
          control smoothness, and controller frequency across static and dynamic scenes.
        </p>
      </section>
      <img src="assets/demo/unicycle-mpc.gif" alt="Unicycle MPC demo">
    </header>

    <section id="content">
      <div class="empty">Loading leaderboard...</div>
    </section>
  </main>

  <script>
    const content = document.getElementById("content");

    function scenarioScore(entry, name) {
      const scenario = entry.scenarios && entry.scenarios[name];
      if (!scenario) {
        return "-";
      }
      return Number(scenario.score).toFixed(1);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render(data) {
      const entries = Array.isArray(data.entries) ? data.entries : [];
      if (entries.length === 0) {
        content.innerHTML = '<div class="empty">No submissions have been scored yet.</div>';
        return;
      }

      const rows = entries.map((entry, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>
            <span class="name">${escapeHtml(entry.name)}</span>
          </td>
          <td><span class="metric">${Number(entry.score).toFixed(1)}</span></td>
          <td><span class="metric">${scenarioScore(entry, "static_multi")}</span></td>
          <td><span class="metric">${scenarioScore(entry, "dynamic_multi")}</span></td>
          <td class="status-${entry.status || "ok"}">${escapeHtml(entry.status || "ok")}</td>
        </tr>
      `).join("");

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Name</th>
              <th>Total</th>
              <th>Static multi</th>
              <th>Dynamic multi</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    fetch("leaderboard.json", { cache: "no-store" })
      .then(response => response.json())
      .then(render)
      .catch(error => {
        content.innerHTML = `<div class="empty">Could not load leaderboard: ${error}</div>`;
      });
  </script>
</body>
</html>
